<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — ChullaCine</title>
  <link rel="stylesheet" href="../css/general.css">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/registro.css">
  <link rel="icon" href="../images/gafas-3d.png" type="image/x-icon">
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="../index.html">ChullaCine</a>
      <nav>
        <ul class="nav-list">
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="../services/services.html">Cartelera</a></li>
          <li><a href="../showtime/showtime.html">Funciones</a></li>
          <li><a href="../offers/offers.html">Ofertas</a></li>
          <li><a href="../about/about.html">Acerca</a></li>
          <li><a href="../contact/contact.html">Contacto</a></li>
        </ul>
      </nav>
      <form action="registro.html" method="get">
        <div class="header-actions">
          <label for="search"><button class="button small" type="submit">Enviar</button></label>
          <input class="search" type="search" placeholder="Ingrese que quiere buscar..." id="buscar" name="buscar">
          <a class="button small" href="../sesion/sesion.html">Iniciar sesión</a>
        </div>
      </form>
    </div>
  </header>

  <main class="container"
   >

    <div class="card">
      <h2>Crear cuenta</h2>

      <form action="../sesion/sesion.html" method="get">

        <div>
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required>
        </div>

        <div>
          <label for="usuario">Nombre de usuario</label>
          <input type="text" id="usuario" name="usuario" placeholder="Ej: juanperez123" required>
        </div>

        <div>
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
        </div>

        <div>
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" maxlength="16"
            pattern="^(?=.*[!@#$%^&*(),.?&quot;:{}|<>])[A-Za-z0-9!@#$%^&*(),.?&quot;:{}|<>]{6,16}$"
            title="La contraseña debe tener entre 6 y 16 caracteres e incluir al menos un carácter especial (Ej: @, $, !, %, *, ?, &)"
            required>
          <small class="muted">
            Entre 6 y 16 caracteres. Debe incluir un carácter especial.
          </small>
        </div>

        <button class="button" type="submit">
          Registrarse
        </button>
      </form>

      <p class="muted">
        ¿Ya tienes cuenta? <a href="../sesion/sesion.html">Inicia sesión
          aquí</a>
      </p>
    </div>

  </main>

  <footer>
    <div class="container">© 2026 ChullaCine</div>
  </footer>
</body>

</html>
